{% extends 'base.html' %}
{% block content %}
<section class="page-hero compact">
  <div>
    <span class="page-kicker">Marketplace Listing</span>
    <h1>{% if item %}Edit Item{% else %}Post a New Item{% endif %}</h1>
    <p>Share clear details so nearby students can request and chat with confidence.</p>
  </div>
</section>

<form method="post" enctype="multipart/form-data" class="app-surface app-form">
  <div class="app-form-grid">
    <div class="full">
      <label for="title">Title</label>
      <input class="form-control" id="title" name="title" placeholder="Engineering Math Book" value="{{ item.title if item else '' }}" required>
    </div>
    <div class="full">
      <label for="description">Description</label>
      <textarea class="form-control" id="description" name="description" rows="4" placeholder="Condition, pickup details, and anything the buyer should know" required>{{ item.description if item else '' }}</textarea>
    </div>
    <div>
      <label for="category">Category</label>
      <input class="form-control" id="category" name="category" placeholder="books, electronics..." value="{{ item.category if item else '' }}" required>
    </div>
    <div>
      <label for="price">Price</label>
      <input class="form-control" id="price" name="price" type="number" step="0.01" min="0" value="{{ item.price if item else 0 }}" required>
    </div>
    <div>
      <label for="status">Status</label>
      <select class="form-select" id="status" name="status">
        <option value="available" {% if not item or item.status == 'available' %}selected{% endif %}>Available</option>
        <option value="sold" {% if item and item.status == 'sold' %}selected{% endif %}>Sold</option>
      </select>
    </div>
    <div>
      <label for="image">Image</label>
      <input class="form-control" id="image" type="file" name="image" accept=".png,.jpg,.jpeg,.gif">
    </div>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary" type="submit">Save Item</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('main.index') }}">Cancel</a>
  </div>
</form>
{% endblock %}
